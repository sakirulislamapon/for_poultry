<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Do You Love Me?</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=Montserrat:wght@300;400&display=swap');

        :root {
            --primary-color: #4a0e4a;
            --secondary-color: #ff69b4;
            --bg-color: #2a0a2a;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, var(--bg-color) 0%, var(--primary-color) 100%);
            color: #fff;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 4rem;
            margin-bottom: 2rem;
            color: var(--secondary-color);
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .btn {
            font-family: 'Montserrat', sans-serif;
            font-size: 1.2rem;
            padding: 12px 30px;
            margin: 15px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #yesBtn {
            background-color: var(--secondary-color);
            color: var(--primary-color);
        }

        #yesBtn:hover {
            background-color: #ff1493;
            box-shadow: 0 0 20px var(--secondary-color);
        }

        #noBtn {
            background-color: var(--primary-color);
            color: #fff;
            position: absolute;
        }

        #noBtn:hover {
            background-color: var(--bg-color);
        }

        #loveMessage {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3rem;
            margin-top: 2rem;
            opacity: 0;
            transition: opacity 0.5s ease;
            color: var(--secondary-color);
        }

        .heart {
            position: absolute;
            pointer-events: none;
            opacity: 0;
            animation: float 4s ease-in infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0) scale(0);
                opacity: 0;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background-color: #fff;
            pointer-events: none;
            opacity: 0;
            animation: twinkle 0.8s ease-in-out infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Do You Love Me?</h1>
        <button id="yesBtn" class="btn">Yes</button>
        <button id="noBtn" class="btn">No</button>
        <div id="loveMessage"></div>
    </div>

    <script>
        const yesBtn = document.getElementById('yesBtn');
        const noBtn = document.getElementById('noBtn');
        const loveMessage = document.getElementById('loveMessage');
        const container = document.querySelector('.container');

        yesBtn.addEventListener('click', () => {
            loveMessage.textContent = 'I Love You Too my Polty!';
            loveMessage.style.opacity = '1';
            createHearts();
            createSparkles();
        });

        noBtn.addEventListener('mouseover', moveButton);
        noBtn.addEventListener('click', moveButton);

        function moveButton() {
            const maxX = window.innerWidth - noBtn.offsetWidth;
            const maxY = window.innerHeight - noBtn.offsetHeight;
            const newX = Math.random() * maxX;
            const newY = Math.random() * maxY;
            
            noBtn.style.position = 'fixed';
            noBtn.style.left = `${newX}px`;
            noBtn.style.top = `${newY}px`;
        }

        function createHearts() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.innerHTML = '❤️';
                heart.classList.add('heart');
                heart.style.left = Math.random() * window.innerWidth + 'px';
                heart.style.fontSize = (Math.random() * 30 + 10) + 'px';
                document.body.appendChild(heart);

                setTimeout(() => {
                    heart.remove();
                }, 4000);
            }, 300);
        }

        function createSparkles() {
            setInterval(() => {
                const sparkle = document.createElement('div');
                sparkle.classList.add('sparkle');
                sparkle.style.left = Math.random() * window.innerWidth + 'px';
                sparkle.style.top = Math.random() * window.innerHeight + 'px';
                document.body.appendChild(sparkle);

                setTimeout(() => {
                    sparkle.remove();
                }, 800);
            }, 50);
        }

        // Background animation
        function createBackgroundEffect() {
            const effect = document.createElement('div');
            effect.style.position = 'fixed';
            effect.style.width = '2px';
            effect.style.height = '2px';
            effect.style.background = `radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%)`;
            effect.style.left = Math.random() * window.innerWidth + 'px';
            effect.style.top = Math.random() * window.innerHeight + 'px';
            effect.style.borderRadius = '50%';
            effect.style.pointerEvents = 'none';
            effect.style.opacity = 0;
            document.body.appendChild(effect);

            let scale = 0;
            let opacity = 0.8;

            function animate() {
                scale += 0.03;
                opacity -= 0.01;
                effect.style.transform = `scale(${scale})`;
                effect.style.opacity = opacity;

                if (opacity > 0) {
                    requestAnimationFrame(animate);
                } else {
                    effect.remove();
                }
            }

            animate();
        }

        setInterval(createBackgroundEffect, 200);
    </script>
</body></html>
